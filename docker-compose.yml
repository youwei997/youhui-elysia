services:
  postgres:
    image: postgres:18-alpine
    container_name: youhui-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - youhui_pg_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: ${PG_DATABASE:-youhui}
      POSTGRES_USER: ${PG_USERNAME:-youhui}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-youhui123}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USERNAME:-youhui} -d ${PG_DATABASE:-youhui}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: youhui-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - youhui_redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-youhui123}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-youhui123}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  youhui_pg_data:
  youhui_redis_data: